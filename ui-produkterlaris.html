  <script>
    // Minimal horizontal scroll micro-interaction
    const scrollContainer = document.querySelector('.overflow-x-auto');
    let isDown = false;
    let startX;
    let scrollLeft;

    scrollContainer.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - scrollContainer.offsetLeft;
      scrollLeft = scrollContainer.scrollLeft;
    });
    scrollContainer.addEventListener('mouseleave', () => {
      isDown = false;
    });
    scrollContainer.addEventListener('mouseup', () => {
      isDown = false;
    });
    scrollContainer.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - scrollContainer.offsetLeft;
      const walk = (x - startX) * 2;
      scrollContainer.scrollLeft = scrollLeft - walk;
    });

    // Custom animation for the arrow
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes bounce-x {
        0%, 100% { transform: translateX(-25%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
        50% { transform: translateX(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
      }
      .animate-bounce-x {
        animation: bounce-x 1s infinite;
      }
    `;
    document.head.appendChild(style);
  </script>
