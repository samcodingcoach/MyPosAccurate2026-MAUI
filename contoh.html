<!DOCTYPE html>

<head>

                        "primary-fixed-dim": "#6fd7d6",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f1",

                        "on-surface": "#191c1d",
                        "surface-bright": "#f8fafa",
                        "tertiary": "#4f5f5f",

                        "surface-container-low": "#f2f4f4",

                        "gutter-mobile": "12px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "margin-mobile": "16px",
                        "base": "4px"
                    },
                    "fontSize": {

                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-lg": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],

<body class="bg-surface text-on-surface min-h-screen">

    <!-- Mock Background Content -->
    <div class="fixed inset-0 z-0 overflow-hidden bg-surface-container">
        <header
            class="flex items-center justify-between px-margin-mobile h-16 w-full bg-surface border-b border-outline-variant shadow-sm">
            <div class="flex items-center gap-sm">
                <span class="material-symbols-outlined text-primary">menu</span>
                <span class="font-headline-sm text-headline-sm font-bold text-primary">Enterprise ERP</span>
            </div>
            <div
                class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
                <span class="material-symbols-outlined text-sm">person</span>
            </div>
        </header>
        <main class="p-margin-mobile">
            <div class="flex flex-col gap-md">
                <div
                    class="h-40 w-full bg-surface-container-high rounded-xl border border-outline-variant animate-pulse">
                </div>
                <div
                    class="h-64 w-full bg-surface-container-high rounded-xl border border-outline-variant animate-pulse">
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modalOverlay"
        class="fixed inset-0 z-50 flex items-center justify-center bg-on-background/40 backdrop-blur-sm p-margin-mobile">

        <!-- Modal Container -->
        <div
            class="bg-surface w-full max-w-lg max-h-[90vh] flex flex-col rounded-xl shadow-xl overflow-hidden border border-outline-variant">

            <!-- Modal Header -->
            <header
                class="flex items-center justify-between px-md py-4 border-b border-outline-variant bg-surface-container-low">
                <div class="flex items-center gap-sm">
                    <button id="closeHeader"
                        class="p-2 -ml-2 hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
                        <span class="material-symbols-outlined text-on-surface-variant">close</span>
                    </button>
                    <h1 class="font-title-lg text-title-lg text-on-surface">Hasil Stok Opname</h1>
                </div>

            </header>

            <!-- Modal Content Scroll Area -->
            <div class="flex-1 overflow-y-auto p-md space-y-lg">

                <!-- Summary Section -->
                <section class="space-y-md">
                    <div class="p-md rounded-lg bg-surface-container-lowest border border-outline-variant">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p
                                    class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">
                                    NO PERIKSA</p>
                                <p class="font-title-md text-title-md text-primary font-bold">OPO.00008</p>
                            </div>
                            <div class="flex flex-col items-end">
                                <span
                                    class="px-3 py-1 rounded-full bg-tertiary-fixed text-on-tertiary-fixed-variant font-label-lg text-label-lg border border-tertiary-fixed-dim">
                                    Dalam Penghitungan
                                </span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-sm pt-4 border-t border-outline-variant">
                            <div class="flex justify-between items-center">
                                <span class="font-body-md text-body-md text-on-surface-variant">Total Rencana SO</span>
                                <span class="font-title-md text-title-md text-on-surface font-semibold">3 items</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Transaction List Section -->
                <section class="space-y-md">
                    <div class="flex items-center justify-between">
                        <h2 class="font-title-md text-title-md text-on-surface">Daftar Transaksi Hasil (OPR)</h2>

                    </div>

                    <!-- List Card -->
                    <div
                        class="group relative overflow-hidden bg-surface-container-low hover:bg-surface-container-high border border-outline-variant rounded-lg transition-all duration-200 cursor-pointer">
                        <div class="p-md flex flex-col gap-sm">
                            <div class="flex justify-between items-center">
                                <span class="font-title-md text-title-md font-bold text-on-surface">OPR.00010</span>
                                <span class="font-label-lg text-label-lg text-on-surface-variant">11/07/2026</span>
                            </div>

                            <div class="flex flex-col gap-base">
                                <div class="flex justify-between items-center">
                                    <span class="font-body-md text-body-md text-on-surface-variant">Stocker</span>
                                    <span class="font-body-md text-body-md text-on-surface">Samsu</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="font-body-md text-body-md text-on-surface-variant">Total
                                        Pemeriksaan</span>
                                    <span class="font-body-md text-body-md text-on-surface font-semibold">3 Items</span>
                                </div>
                            </div>
                        </div>
                        <!-- Active Hover State Accent -->
                        <div
                            class="absolute inset-y-0 left-0 w-1 bg-primary transform scale-y-0 group-hover:scale-y-100 transition-transform">
                        </div>
                    </div>
                </section>



            </div>

            <!-- Modal Footer -->
            <footer class="p-md border-t border-outline-variant bg-surface flex justify-end gap-sm">
                <button id="closeFooter"
                    class="w-full sm:w-auto px-6 py-3 font-title-md text-title-md text-on-primary bg-primary hover:bg-primary-container rounded-lg shadow-sm transition-all active:scale-[0.98]">EXPORT
                    PDF</button>

                <button id="closeFooter"
                    class="w-full sm:w-auto px-6 py-3 font-title-md text-title-md text-on-primary bg-primary hover:bg-primary-container rounded-lg shadow-sm transition-all active:scale-[0.98]">
                    SELESAI</button>
            </footer>
        </div>
    </div>

    <!-- Bottom Navigation (Filtered to show in mock background context) -->
</body>

</html>
